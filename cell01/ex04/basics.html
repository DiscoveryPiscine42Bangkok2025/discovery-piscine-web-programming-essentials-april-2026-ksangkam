<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics</title>
    <style>
        body {
            background-color: pink;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }

        h1 {
            color: white;
            text-align: center;
        }

        .main-container {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 50px;
            margin-top: 50px;
        }

        .item-column {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
        }

        .item-column a {
            font-family: monospace;
            color: white;
            text-decoration: none;
            background-color: rgba(0,0,0,0.1); 
            border-radius: 5px;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-family: monospace;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>-so bigger-</h1>

    <div class="main-container">
        
        <div class="item-column">
            <img src="https://mms.img.susercontent.com/th-11134004-81ztd-ml315zrab7cxf3" 
                 alt="shopee icon" width="300" height="300">
            <a href="https://shopee.co.th/">Enter shopee.co.th link</a>
        </div>

        <div class="item-column">
            <img src="https://s3-eu-west-1.amazonaws.com/tpd/logos/4bacdd6c0000640005054e79/0x0.png" 
                 alt="Aliexpress icon" width="300" height="300">
            <a href="https://best.aliexpress.com/?browser_redirect=true">Enter aliexpress.com link</a>
        </div>

    </div>

    <hr style="margin-top: 50px; border: 0; border-top: 1px solid white;">
    
    <div class="footer">
        © wil 2026
    </div>

</body>
</html>
