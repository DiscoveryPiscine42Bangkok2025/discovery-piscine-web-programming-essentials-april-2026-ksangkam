<!DOCTYPE html>
<html>
<head>
<style>
  table {
    border-collapse: collapse;
    width: 100%;
  }
  td {
    border: 2px solid #333;
    padding: 70px;
    text-align: center;
    font-size: 50px;
    font-weight: bold;
    height: 300px;
    vertical-align: middle;
  }
  
  .box-red {
    background-color: #ff9d9dfa; 
    color: #8b1313; 
  }

    .box-blue {
    background-color: #add8e6;
    color: #00008b;
  }
</style>
</head>
<body>
<h1 style="text-align: center;">What elements do we need to make Murasaki?</h1>
<table>
  <tr>
    <td class="box-red">Aka</td>
    <td class="box-blue">Ao</td>
  </tr>
</table>

</body>
</html>
